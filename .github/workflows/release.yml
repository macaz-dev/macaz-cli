name: Release merged PR

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: read

jobs:
  verify:
    name: Verify merged source
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify modules
        run: go mod verify

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Run race tests
        run: go test -race ./...

  version:
    name: Reserve incremental version
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Resolve and push release tag
        id: version
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail

          semver_tags() {
            git tag --list 'v*' |
              awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/' |
              sort -V
          }

          git fetch --force --tags origin

          existing_tag="$({
            git tag --points-at "${MERGE_SHA}" --list 'v*' |
              awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/' |
              sort -V
          } | tail -n 1)"

          if [ -n "${existing_tag}" ]; then
            tag="${existing_tag}"
            echo "Reusing ${tag}; this merged commit is already tagged."
          else
            bump="patch"
            case " ${LABELS} " in
              *" release:major "*) bump="major" ;;
              *" release:minor "*) bump="minor" ;;
            esac

            tag=""
            for attempt in 1 2 3 4 5 6 7 8; do
              latest_tag="$(semver_tags | tail -n 1)"

              if [ -z "${latest_tag}" ]; then
                case "${bump}" in
                  major) candidate="v1.0.0" ;;
                  *) candidate="v0.1.0" ;;
                esac
              else
                version="${latest_tag#v}"
                IFS='.' read -r major minor patch <<< "${version}"
                case "${bump}" in
                  major)
                    major="$((major + 1))"
                    minor=0
                    patch=0
                    ;;
                  minor)
                    minor="$((minor + 1))"
                    patch=0
                    ;;
                  patch)
                    patch="$((patch + 1))"
                    ;;
                esac
                candidate="v${major}.${minor}.${patch}"
              fi

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag -a "${candidate}" \
                -m "Release ${candidate} from PR #${PR_NUMBER}" \
                "${MERGE_SHA}"

              if git push origin "refs/tags/${candidate}"; then
                tag="${candidate}"
                break
              fi

              echo "Tag reservation raced on attempt ${attempt}; retrying."
              git tag -d "${candidate}"
              git fetch --force --tags origin
            done

            if [ -z "${tag}" ]; then
              echo "Unable to reserve a release tag after multiple attempts." >&2
              exit 1
            fi
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build production artifacts
    needs: version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build production package
        env:
          RELEASE_TAG: ${{ needs.version.outputs.tag }}
        run: |
          OUTPUT_DIR="${RUNNER_TEMP}/macaz-prod" \
            ./scripts/build-release.sh "${RELEASE_TAG}"

      - name: Attest production binaries
        if: github.event.repository.private == false
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ runner.temp }}/macaz-prod/macaz-*

      - name: Upload production package
        uses: actions/upload-artifact@v4
        with:
          name: macaz-${{ needs.version.outputs.tag }}
          path: ${{ runner.temp }}/macaz-prod/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs:
      - version
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download production package
        uses: actions/download-artifact@v4
        with:
          name: macaz-${{ needs.version.outputs.tag }}
          path: prod

      - name: Publish release and generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: macaz ${{ needs.version.outputs.version }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          generate_release_notes: true
          files: prod/*
          fail_on_unmatched_files: true
          make_latest: legacy
